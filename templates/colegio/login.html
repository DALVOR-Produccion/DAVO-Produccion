{% extends 'base.html' %}

{% block content %}

<div class="card" style="max-width:500px; margin:auto;">

    <h2>Acceso Institucional</h2>

    <p>
        Plataforma de acceso para establecimientos educacionales.
    </p>

    <hr>

    <form method="POST">

        <div class="form-group">

            <label>Usuario institucional</label>

            <input type="text"
                   name="username"
                   required>

        </div>

        <div class="form-group">

            <label>Contraseña</label>

            <input type="password"
                   name="password"
                   required>

        </div>

        <button type="submit" class="btn">
            Ingresar
        </button>

    </form>

</div>

{% endblock %}
